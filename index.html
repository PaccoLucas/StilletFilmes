<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stillet Filmes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00c6ff;
            --secondary: #0072ff;
            --dark-bg: #050b14;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a1f44, #000814, #021b3a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* CONTAINER GLASSMORPHISM */
        .container {
            width: 100%;
            max-width: 420px;
            padding: 30px 20px;
            text-align: center;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            margin: 20px;
            z-index: 10;
        }

        /* ANIMAÇÃO DE ENTRADA */
        @keyframes smoothIn {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .reveal {
            opacity: 0;
            animation: smoothIn 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* HEADER & LOGO */
        .logo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--glass-border);
            box-shadow: 0 0 25px rgba(0, 198, 255, 0.4);
            transition: transform 0.3s ease;
        }
        
        .logo:hover {
            transform: scale(1.05);
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin: 15px 0 25px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        /* CARROSSEL */
        .carousel-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            overflow: hidden;
            transition: transform 0.1s ease-out;
        }

        .slides {
            position: relative;
            width: 100%;
            aspect-ratio: 4/5;
            background: #000;
        }

        .slide {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transform: scale(1.05);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .slide.active {
            opacity: 1;
            transform: scale(1);
        }

        /* BOTÕES DE NAVEGAÇÃO */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .nav-btn:hover {
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
        }

        .prev { left: 10px; }
        .next { right: 10px; }

        /* INDICADORES (DOTS) */
        .indicators {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dot.active {
            background: var(--primary);
            width: 20px;
            border-radius: 10px;
        }

        /* BOTÃO PRINCIPAL (CTA) */
        .btn-cta {
            position: relative;
            width: 100%;
            padding: 16px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 198, 255, 0.3);
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(0, 198, 255, 0.5);
        }

        .btn-cta:active {
            transform: translateY(2px);
        }

        /* SPINNER DENTRO DO BOTÃO */
        .btn-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* RESPONSIVIDADE */
        @media(max-width: 450px) {
            .container {
                margin: 10px;
                padding: 25px 15px;
                border-radius: 20px;
            }
            h1 { font-size: 22px; }
        }
    </style>
</head>

<body>

    <main class="container">
        <!-- CABEÇALHO -->
        <header>
            <img src="images/654931150_17869466130588777_4411501239579348033_n.jpg" alt="Logo Stillet Filmes" class="logo reveal" style="animation-delay: 0.1s;">
            <h1 class="reveal" style="animation-delay: 0.2s;">Stillet Filmes</h1>
        </header>

        <!-- CARROSSEL -->
        <section class="carousel-wrapper reveal" id="carousel" style="animation-delay: 0.3s;">
            <div class="slides">
                <!-- Imagens mantidas exatamente com o mesmo caminho -->
                <img src="images/WhatsApp Image 2026-05-02 at 15.26.27 (1).jpeg" alt="Filme 1" class="slide active">
                <img src="images/WhatsApp Image 2026-05-02 at 15.26.27.jpeg" alt="Filme 2" class="slide">
                <img src="images/WhatsApp Image 2026-05-02 at 15.26.28 (1).jpeg" alt="Filme 3" class="slide">
                <img src="images/WhatsApp Image 2026-05-02 at 15.26.28.jpeg" alt="Filme 4" class="slide">
            </div>

            <!-- Controles do Carrossel -->
            <button class="nav-btn prev" onclick="changeSlide(-1)" aria-label="Anterior">❮</button>
            <button class="nav-btn next" onclick="changeSlide(1)" aria-label="Próximo">❯</button>

            <!-- Pontos Indicadores -->
            <div class="indicators" id="indicators"></div>
        </section>

        <!-- BOTÃO DE ATENDIMENTO -->
        <button id="actionBtn" class="btn-cta reveal" style="animation-delay: 0.4s;" onclick="start()">
            <span id="btnText">Iniciar atendimento</span>
            <div class="btn-spinner" id="btnSpinner"></div>
        </button>
    </main>

    <script>
        /* SCRIPT DO BOTÃO & REDIRECIONAMENTO */
        function start() {
            const btn = document.getElementById("actionBtn");
            const btnText = document.getElementById("btnText");
            const btnSpinner = document.getElementById("btnSpinner");

            // Muda o estado do botão
            btn.style.pointerEvents = "none";
            btnText.innerText = "Conectando...";
            btnSpinner.style.display = "block";

            // Aguarda 1.8s e redireciona (link mantido)
            setTimeout(() => {
                window.location.href = "https://funilpro.com.br/funil.php?id=3XJ9Vm";
            }, 1800);
        }

        /* SCRIPT DO CARROSSEL */
        let currentSlide = 0;
        const slides = document.querySelectorAll(".slide");
        const indicatorsContainer = document.getElementById("indicators");
        let autoPlayInterval;

        // Criar os pontos (dots) dinamicamente com base na quantidade de imagens
        slides.forEach((_, index) => {
            const dot = document.createElement("div");
            dot.classList.add("dot");
            if (index === 0) dot.classList.add("active");
            dot.addEventListener("click", () => goToSlide(index));
            indicatorsContainer.appendChild(dot);
        });

        const dots = document.querySelectorAll(".dot");

        function updateCarousel() {
            slides.forEach((slide, index) => {
                slide.classList.remove("active");
                dots[index].classList.remove("active");
            });
            slides[currentSlide].classList.add("active");
            dots[currentSlide].classList.add("active");
        }

        function changeSlide(direction) {
            currentSlide += direction;
            if (currentSlide >= slides.length) currentSlide = 0;
            if (currentSlide < 0) currentSlide = slides.length - 1;
            updateCarousel();
            resetAutoPlay();
        }

        function goToSlide(index) {
            currentSlide = index;
            updateCarousel();
            resetAutoPlay();
        }

        /* AUTO PLAY */
        function startAutoPlay() {
            autoPlayInterval = setInterval(() => {
                changeSlide(1);
            }, 4000);
        }

        function resetAutoPlay() {
            clearInterval(autoPlayInterval);
            startAutoPlay();
        }

        startAutoPlay();

        /* PARALLAX INTELIGENTE (Apenas para Desktop) */
        const carousel = document.getElementById("carousel");
        
        // Só aplica parallax se o dispositivo tiver mouse (evita bugs em celular)
        if (window.matchMedia("(pointer: fine)").matches) {
            document.addEventListener("mousemove", (e) => {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 40;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 40;
                carousel.style.transform = `perspective(1000px) rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });

            // Reseta o parallax se o mouse sair da tela
            document.addEventListener("mouseleave", () => {
                carousel.style.transform = `perspective(1000px) rotateY(0deg) rotateX(0deg)`;
            });
        }
    </script>
</body>
</html>
