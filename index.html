<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stillet Filmes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

:root {
    --blue1: #0a1f44;
    --blue2: #003d80;
    --accent: #00c6ff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0a1f44, #000814);
    color: white;
    display: flex;
    justify-content: center;
    overflow-x: hidden;
    min-height: 100vh;
}

/* CONTAINER */
.container {
    width: 100%;
    max-width: 420px;
    padding: 20px;
    text-align: center;
    backdrop-filter: blur(20px);
}

/* ANIMAÇÃO */
@keyframes smoothIn {

    0% {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
        filter: blur(10px);
    }

    100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
    }
}

.reveal {
    opacity: 0;
    animation: smoothIn 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

/* LOGO */
.logo {

    width: 110px;
    height: 110px;

    border-radius: 50%;
    object-fit: cover;

    border: 2px solid rgba(255,255,255,0.2);

    box-shadow:
    0 0 30px rgba(0,198,255,0.5);
}

/* TÍTULO */
h1 {

    font-size: 26px;
    margin: 15px 0 25px;
    letter-spacing: 1px;
}

/* CARROSSEL */
.carousel {

    position: relative;

    width: 100%;

    margin-bottom: 25px;

    overflow: hidden;

    border-radius: 24px;

    box-shadow:
    0 20px 50px rgba(0,0,0,0.6);

    transition: transform 0.3s ease;
}

/* ÁREA DAS IMAGENS */
.slides {

    position: relative;

    width: 100%;

    aspect-ratio: 4/5;
}

/* IMAGENS */
.slide {

    position: absolute;
    inset: 0;

    width: 100%;
    height: 100%;

    object-fit: cover;

    opacity: 0;

    transition:
    opacity 0.7s ease,
    transform 0.5s ease;
}

.slide.active {

    opacity: 1;
    transform: scale(1.02);
}

/* BOTÕES */
.nav {

    position: absolute;

    top: 50%;
    transform: translateY(-50%);

    z-index: 10;

    width: 42px;
    height: 42px;

    border: none;
    border-radius: 50%;

    cursor: pointer;

    background: rgba(0,0,0,0.35);

    backdrop-filter: blur(10px);

    color: white;

    font-size: 18px;

    transition: 0.3s;
}

.nav:hover {

    background: rgba(0,198,255,0.85);

    transform:
    translateY(-50%)
    scale(1.08);
}

.prev {
    left: 12px;
}

.next {
    right: 12px;
}

/* BOTÃO */
.btn {

    position: relative;

    overflow: hidden;

    background:
    linear-gradient(
    135deg,
    #00c6ff,
    #0072ff);

    border: none;

    padding: 16px;

    width: 100%;

    border-radius: 40px;

    color: white;

    font-size: 16px;
    font-weight: 600;

    cursor: pointer;

    box-shadow:
    0 10px 30px rgba(0,198,255,0.4);

    transition: all 0.3s ease;
}

.btn:hover {

    transform: scale(1.05);

    box-shadow:
    0 15px 40px rgba(0,198,255,0.7);
}

/* SPINNER */
.spinner {

    display: none;

    margin: 25px auto;

    width: 45px;
    height: 45px;

    border-radius: 50%;

    background:
    conic-gradient(
    #00c6ff,
    transparent,
    #00c6ff);

    -webkit-mask:
    radial-gradient(
    farthest-side,
    transparent 60%,
    black 61%);

    animation: spin 1s linear infinite;
}

@keyframes spin {

    to {
        transform: rotate(360deg);
    }
}

/* RESPONSIVO */
@media(max-width:500px){

    .container{
        padding:16px;
    }

    h1{
        font-size:24px;
    }

}

</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <img
    src="images/654931150_17869466130588777_4411501239579348033_n.jpg"
    alt="Logo Stillet Filmes"
    class="logo reveal"
    style="animation-delay:0.2s;">

    <!-- TÍTULO -->
    <h1
    class="reveal"
    style="animation-delay:0.4s;">

    Stillet Filmes

    </h1>

    <!-- CARROSSEL -->
    <div
    class="carousel reveal"
    style="animation-delay:0.6s;">

        <div class="slides">

            <!-- FOTO 1 -->
            <img
            src="images/WhatsApp Image 2026-05-02 at 15.26.27 (1).jpeg"
            class="slide active">

            <!-- FOTO 2 -->
            <img
            src="images/WhatsApp Image 2026-05-02 at 15.26.27.jpeg"
            class="slide">

            <!-- FOTO 3 -->
            <img
            src="images/WhatsApp Image 2026-05-02 at 15.26.28 (1).jpeg"
            class="slide">

            <!-- FOTO 4 -->
            <img
            src="images/WhatsApp Image 2026-05-02 at 15.26.28.jpeg"
            class="slide">

        </div>

        <!-- BOTÕES -->
        <button
        class="nav prev"
        onclick="changeSlide(-1)">

        ❮

        </button>

        <button
        class="nav next"
        onclick="changeSlide(1)">

        ❯

        </button>

    </div>

    <!-- BOTÃO -->
    <button
    class="btn reveal"
    style="animation-delay:0.8s;"
    onclick="start()">

    Iniciar atendimento

    </button>

    <!-- SPINNER -->
    <div class="spinner" id="spinner"></div>

</div>

<script>

/* BOTÃO */
function start() {

    const spinner =
    document.getElementById("spinner");

    spinner.style.display = "block";

    setTimeout(() => {

        window.location.href =
        "https://funilpro.com.br/funil.php?id=3XJ9Vm";

    }, 1800);
}

/* CARROSSEL */
let currentSlide = 0;

const slides =
document.querySelectorAll(".slide");

function showSlide(index) {

    slides.forEach(slide => {

        slide.classList.remove("active");

    });

    slides[index]
    .classList.add("active");
}

function changeSlide(direction) {

    currentSlide += direction;

    if(currentSlide >= slides.length) {

        currentSlide = 0;
    }

    if(currentSlide < 0) {

        currentSlide =
        slides.length - 1;
    }

    showSlide(currentSlide);
}

/* AUTO PLAY */
setInterval(() => {

    changeSlide(1);

}, 4000);

/* PARALLAX */
const carousel =
document.querySelector(".carousel");

document.addEventListener("mousemove", (e) => {

    let x =
    (window.innerWidth / 2 - e.clientX) / 60;

    let y =
    (window.innerHeight / 2 - e.clientY) / 60;

    carousel.style.transform =
    `translate(${x}px, ${y}px)`;

});

</script>

</body>
</html>
